kind = "web"
previewPath = "/"
title = "Campus Recycle Admin Dashboard"
version = "1.0.0"
id = "artifacts/admin-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8081

[services.development]
run = "pnpm --filter @workspace/admin-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-dashboard", "run", "build" ]
publicDir = "artifacts/admin-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8081"
BASE_PATH = "/"
